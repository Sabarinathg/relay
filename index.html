<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Relay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C6F135">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Relay">
<style>
  :root{
    --bg:#F4F1E8;
    --ink:#111111;
    --lime:#C6F135;
    --pink:#FF6EC7;
    --purple:#8B6BFF;
    --white:#ffffff;
    --text-dim:#4D4D4D;
    --danger:#E24B4A;
    --font-body:Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:var(--bg); color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  #root{ min-height:100vh; display:flex; justify-content:center; padding:0; }
  .wrap{
    width:100%; max-width:640px;
    border:3px solid var(--ink);
    background-image:linear-gradient(#00000012 1px,transparent 1px),linear-gradient(90deg,#00000012 1px,transparent 1px);
    background-size:16px 16px;
    min-height:100vh;
  }
  .hdr{
    background:var(--lime);
    border-bottom:3px solid var(--ink);
    padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .hdr h1{ font-size:26px; font-weight:900; margin:0; color:var(--ink); letter-spacing:0.5px; }
  .hdr-actions{ display:flex; align-items:center; gap:10px; }
  .status{
    display:flex; align-items:center; gap:6px;
    background:var(--ink); color:var(--lime);
    font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;
    padding:5px 10px;
  }
  .dot{ width:7px;height:7px;border-radius:50%; background:var(--lime); animation:pulse 2s ease-in-out infinite; }
  .dot.off{ background:var(--danger); animation:none; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .body-pad{ padding:20px; }
  .sub{ color:var(--text-dim); font-size:13px; font-weight:600; margin:0 0 18px; }
  .settings-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11px; font-weight:700; color:var(--ink); margin:0 0 18px; flex-wrap:wrap; text-transform:uppercase; }
  .settings-row label{ display:flex; align-items:center; gap:8px; }
  .settings-row select{ background:var(--white); color:var(--ink); border:2px solid var(--ink); padding:5px 8px; font-size:11px; font-weight:700; font-family:var(--font-body); }
  .composer{ background:var(--purple); border:3px solid var(--ink); padding:14px; margin-bottom:20px; box-shadow:4px 4px 0 var(--ink); }
  .composer-inner{ background:var(--white); border:3px solid var(--ink); padding:10px; }
  textarea{ width:100%; min-height:70px; resize:vertical; background:transparent; border:none; outline:none; color:var(--ink); font-family:var(--font-body); font-size:14px; font-weight:600; line-height:1.5; }
  textarea::placeholder{ color:#8a8a8a; font-weight:600; }
  .composer-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:10px; }
  .composer-foot-left{ display:flex; align-items:center; gap:10px; }
  .attach-btn{ background:var(--white); color:var(--ink); font-weight:900; font-size:16px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:3px solid var(--ink); }
  .attach-btn:hover{ background:var(--lime); }
  .file-chip{ display:none; align-items:center; gap:8px; background:var(--lime); border:2px solid var(--ink); padding:6px 10px; margin-top:10px; font-size:12px; font-weight:700; }
  .file-chip.show{ display:flex; }
  .file-chip .file-remove{ background:var(--ink); color:var(--white); width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; cursor:pointer; }
  .charcount{ font-size:11px; font-weight:700; color:var(--ink); letter-spacing:0.3px; }
  button{ font-family:var(--font-body); cursor:pointer; border:none; outline:none; }
  .send-btn{ background:var(--pink); color:var(--ink); font-weight:900; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; padding:9px 22px; border:3px solid var(--ink); box-shadow:3px 3px 0 var(--ink); transition:transform 0.08s ease; }
  .send-btn:hover{ filter:brightness(1.05); }
  .send-btn:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
  .send-btn:disabled{ background:#ddd; color:#999; cursor:not-allowed; box-shadow:none; }
  .list-hdr{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; }
  .list-hdr-left{ display:flex; align-items:center; gap:8px; }
  .list-hdr span{ background:var(--ink); color:var(--white); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; padding:4px 10px; }
  .new-updates-btn{ display:none; align-items:center; gap:6px; background:var(--pink); color:var(--ink); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.4px; padding:4px 10px; border:2px solid var(--ink); animation:blink 1.4s ease-in-out infinite; }
  .new-updates-btn.show{ display:inline-flex; }
  .new-updates-btn .nb-dot{ width:6px; height:6px; border-radius:50%; background:var(--ink); }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .clear-all{ background:transparent; color:var(--ink); font-size:11px; font-weight:800; text-transform:uppercase; border-bottom:2px solid var(--ink); padding:2px 0; }
  .clear-all:hover{ color:var(--danger); border-color:var(--danger); }
  .entry{ background:var(--pink); border:3px solid var(--ink); border-radius:10px; padding:14px; margin-bottom:12px; box-shadow:3px 3px 0 var(--ink); animation:slidein 0.25s ease; }
  .entry:nth-child(even){ background:var(--lime); }
  @keyframes slidein{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  .entry-text{ font-size:14px; font-weight:700; line-height:1.5; white-space:pre-wrap; word-break:break-word; margin-bottom:10px; color:var(--ink); }
  .entry-img{ width:100%; max-height:280px; object-fit:cover; border:3px solid var(--ink); margin-bottom:10px; cursor:pointer; display:block; }
  .entry-file{ display:flex; align-items:center; gap:10px; background:var(--white); border:3px solid var(--ink); padding:10px; margin-bottom:10px; }
  .entry-file-icon{ width:34px; height:34px; background:var(--ink); color:var(--white); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; flex-shrink:0; }
  .entry-file-name{ font-size:12px; font-weight:700; color:var(--ink); word-break:break-all; flex:1; }
  .entry-file a{ color:var(--ink); text-decoration:underline; font-size:11px; font-weight:800; text-transform:uppercase; flex-shrink:0; }
  .entry-foot{ display:flex; justify-content:space-between; align-items:center; }
  .entry-time{ font-size:10px; font-weight:800; color:var(--ink); text-transform:uppercase; }
  .entry-actions{ display:flex; gap:6px; }
  .icon-btn{ background:var(--white); color:var(--ink); font-size:10px; font-weight:800; text-transform:uppercase; padding:4px 10px; border-radius:6px; border:2px solid var(--ink); }
  .icon-btn:hover{ filter:brightness(0.95); }
  .icon-btn.danger{ background:var(--ink); color:var(--white); }
  .icon-btn.danger:hover{ background:var(--danger); border-color:var(--danger); }
  .empty{ text-align:center; color:var(--text-dim); font-size:13px; font-weight:600; padding:50px 20px; border:3px dashed var(--ink); background:var(--white); }
  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--lime); font-size:13px; font-weight:800; text-transform:uppercase; padding:9px 18px; border:2px solid var(--ink); opacity:0; pointer-events:none; transition:opacity 0.2s ease, transform 0.2s ease; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .setup-banner{ background:var(--white); border:3px solid var(--danger); padding:16px; margin-bottom:20px; font-size:13px; font-weight:600; line-height:1.6; }
  .setup-banner b{ color:var(--danger); }
</style>
</head>
<body>
<div id="root">
  <div class="wrap">
    <div class="hdr">
      <h1>RELAY</h1>
      <div class="hdr-actions">
        <div class="status"><span class="dot" id="status-dot"></span><span id="status-text">connecting…</span></div>
      </div>
    </div>

    <div class="body-pad">
    <p class="sub">Type on one device, grab it on the other. Synced through your own Supabase project.</p>

    <div id="setup-banner"></div>

    <div class="settings-row">
      <label>Auto-delete after
        <select id="autoclear">
          <option value="0">Never</option>
          <option value="1">1 day</option>
          <option value="3">3 days</option>
          <option value="7" selected>7 days</option>
          <option value="30">30 days</option>
        </select>
      </label>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" placeholder="Paste or type something to send to your other device…"></textarea>
      </div>
      <div class="file-chip" id="file-chip">
        <span id="file-chip-name"></span>
        <span class="file-remove" id="file-remove">&#10005;</span>
      </div>
      <div class="composer-foot">
        <div class="composer-foot-left">
          <button class="attach-btn" id="attach-btn" title="Attach image or PDF" type="button">+</button>
          <span class="charcount" id="charcount">0 characters</span>
        </div>
        <button class="send-btn" id="send-btn">Send &#8594;</button>
      </div>
      <input type="file" id="file-input" accept="image/*,application/pdf" style="display:none">
    </div>

    <div class="list-hdr">
      <div class="list-hdr-left">
        <span id="list-count">History</span>
        <button class="new-updates-btn" id="new-updates-btn" type="button"><span class="nb-dot"></span>Incoming!</button>
      </div>
      <button class="clear-all" id="clear-all">Clear all</button>
    </div>

    <div id="list"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  // ---- FILL THESE IN from your Supabase project (Settings > API) ----
  const SUPABASE_URL = 'https://spgoegviwtunultgczyh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwZ29lZ3Zpd3R1bnVsdGdjenloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTg3NDUsImV4cCI6MjA5OTI5NDc0NX0.cFOzEjOXVc5e89xngtWP7dzJ7SS6fJpF5xWtHgGC1kQ';
  // ---------------------------------------------------------------------

  const needsSetup = SUPABASE_URL.includes('YOUR_SUPABASE_URL') || SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY');
  const setupBanner = document.getElementById('setup-banner');
  if(needsSetup){
    setupBanner.innerHTML = '<div class="setup-banner">Relay isn\'t connected yet. Open <b>index.html</b> and paste your Supabase URL and anon key at the top of the script. See SETUP.md for the exact steps.</div>';
  }

  const supabase = needsSetup ? null : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TABLE = 'relay_entries';

  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const list = document.getElementById('list');
  const charcount = document.getElementById('charcount');
  const listCount = document.getElementById('list-count');
  const clearAllBtn = document.getElementById('clear-all');
  const statusText = document.getElementById('status-text');
  const statusDot = document.getElementById('status-dot');
  const toastEl = document.getElementById('toast');
  const autoclearSelect = document.getElementById('autoclear');
  const attachBtn = document.getElementById('attach-btn');
  const fileInput = document.getElementById('file-input');
  const fileChip = document.getElementById('file-chip');
  const fileChipName = document.getElementById('file-chip-name');
  const fileRemove = document.getElementById('file-remove');
  const newUpdatesBtn = document.getElementById('new-updates-btn');

  let entries = [];
  let toastTimer = null;
  let selectedFile = null;
  const BUCKET = 'relay-files';
  const MAX_FILE_MB = 15;

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 1400);
  }

  function setStatus(ok, label){
    statusText.textContent = label;
    statusDot.classList.toggle('off', !ok);
  }

  function timeAgo(ts){
    const diff = Math.floor((Date.now() - ts) / 1000);
    if(diff < 5) return 'just now';
    if(diff < 60) return diff + 's ago';
    if(diff < 3600) return Math.floor(diff/60) + 'm ago';
    if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' +
           new Date(ts).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }

  function render(){
    if(!entries.length){
      list.innerHTML = '<div class="empty">Nothing sent yet. Type something above and hit Send —<br>it\'ll show up here on every device.</div>';
      listCount.textContent = 'History';
      return;
    }
    listCount.textContent = 'History (' + entries.length + ')';
    list.innerHTML = entries.map(e => {
      let media = '';
      if(e.file_url){
        if(e.file_type === 'image'){
          media = `<img class="entry-img" src="${e.file_url}" alt="${e.file_name || 'shared image'}" data-open="${e.file_url}">`;
        }else{
          media = `<div class="entry-file"><div class="entry-file-icon">PDF</div><span class="entry-file-name">${e.file_name || 'document.pdf'}</span><a href="${e.file_url}" target="_blank" rel="noopener">Open</a></div>`;
        }
      }
      const textHtml = e.text ? '<div class="entry-text"></div>' : '';
      const actionBtn = e.file_url
        ? '<button class="icon-btn download-btn">Download</button>'
        : '<button class="icon-btn copy-btn">Copy</button>';
      return `
      <div class="entry" data-id="${e.id}">
        ${media}
        ${textHtml}
        <div class="entry-foot">
          <span class="entry-time">${timeAgo(new Date(e.created_at).getTime())}</span>
          <div class="entry-actions">
            ${actionBtn}
            <button class="icon-btn danger del-btn">Del</button>
          </div>
        </div>
      </div>
    `;
    }).join('');
    [...list.querySelectorAll('.entry')].forEach(node => {
      const id = node.getAttribute('data-id');
      const entry = entries.find(e => String(e.id) === id);
      const textNode = node.querySelector('.entry-text');
      if(textNode) textNode.textContent = entry.text;
      const copyBtn = node.querySelector('.copy-btn');
      if(copyBtn) copyBtn.addEventListener('click', () => copyEntry(entry.text));
      const downloadBtn = node.querySelector('.download-btn');
      if(downloadBtn) downloadBtn.addEventListener('click', () => downloadFile(entry.file_url, entry.file_name));
      node.querySelector('.del-btn').addEventListener('click', () => deleteEntry(id));
      const img = node.querySelector('.entry-img');
      if(img) img.addEventListener('click', () => window.open(img.dataset.open, '_blank'));
    });
  }

  async function downloadFile(url, filename){
    try{
      const res = await fetch(url);
      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl;
      a.download = filename || 'file';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objUrl);
      showToast('Downloaded');
    }catch(err){
      console.error(err);
      window.open(url, '_blank');
    }
  }

  function copyEntry(text){
    navigator.clipboard.writeText(text).then(()=> showToast('Copied')).catch(()=> showToast('Could not copy'));
  }

  async function fetchEntries(){
    if(!supabase) return;
    const { data, error } = await supabase.from(TABLE).select('*').order('created_at', { ascending: false }).limit(200);
    if(error){ console.error(error); setStatus(false, 'offline'); return; }
    entries = data;
    render();
    newUpdatesBtn.classList.remove('show');
    setStatus(true, 'synced');
  }

  async function checkForUpdates(){
    if(!supabase) return;
    const { data, error } = await supabase.from(TABLE).select('id').order('created_at', { ascending: false }).limit(1);
    if(error) return;
    const latestId = data && data[0] ? data[0].id : null;
    const knownId = entries[0] ? entries[0].id : null;
    if(latestId !== knownId){
      newUpdatesBtn.classList.add('show');
    }
  }

  newUpdatesBtn.addEventListener('click', fetchEntries);

  async function sendEntry(){
    const text = input.value.trim();
    if(!text && !selectedFile) return;
    if(!supabase) return;

    sendBtn.disabled = true;
    let file_url = null, file_name = null, file_type = null;

    if(selectedFile){
      const isImage = selectedFile.type.startsWith('image/');
      const isPdf = selectedFile.type === 'application/pdf';
      if(!isImage && !isPdf){
        showToast('Only images or PDFs');
        sendBtn.disabled = false;
        return;
      }
      if(selectedFile.size > MAX_FILE_MB * 1024 * 1024){
        showToast('File too large (max ' + MAX_FILE_MB + 'MB)');
        sendBtn.disabled = false;
        return;
      }
      const ext = selectedFile.name.split('.').pop();
      const path = Date.now() + '-' + Math.random().toString(36).slice(2,8) + '.' + ext;
      const { error: upErr } = await supabase.storage.from(BUCKET).upload(path, selectedFile);
      if(upErr){
        console.error(upErr);
        showToast('Upload failed');
        sendBtn.disabled = false;
        return;
      }
      const { data: pub } = supabase.storage.from(BUCKET).getPublicUrl(path);
      file_url = pub.publicUrl;
      file_name = selectedFile.name;
      file_type = isImage ? 'image' : 'pdf';
    }

    input.value = '';
    charcount.textContent = '0 characters';
    clearFile();

    const { error } = await supabase.from(TABLE).insert({ text, file_url, file_name, file_type });
    sendBtn.disabled = false;
    if(error){ console.error(error); showToast('Send failed'); return; }
    fetchEntries();
  }

  async function deleteEntry(id){
    if(!supabase) return;
    const entry = entries.find(e => String(e.id) === id);
    const { error } = await supabase.from(TABLE).delete().eq('id', id);
    if(error){ console.error(error); showToast('Delete failed'); return; }
    if(entry && entry.file_url){
      const path = entry.file_url.split('/' + BUCKET + '/').pop();
      if(path) supabase.storage.from(BUCKET).remove([path]).catch(() => {});
    }
    fetchEntries();
  }

  clearAllBtn.addEventListener('click', async () => {
    if(!supabase || !entries.length) return;
    const { error } = await supabase.from(TABLE).delete().neq('id', '00000000-0000-0000-0000-000000000000');
    if(error){ console.error(error); showToast('Clear failed'); return; }
    fetchEntries();
  });

  sendBtn.addEventListener('click', sendEntry);
  input.addEventListener('keydown', (e) => {
    if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){ e.preventDefault(); sendEntry(); }
  });
  input.addEventListener('input', () => { charcount.textContent = input.value.length + ' characters'; });

  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if(!f) return;
    const isImage = f.type.startsWith('image/');
    const isPdf = f.type === 'application/pdf';
    if(!isImage && !isPdf){
      showToast('Only images or PDFs');
      fileInput.value = '';
      return;
    }
    selectedFile = f;
    fileChipName.textContent = f.name;
    fileChip.classList.add('show');
  });
  function clearFile(){
    selectedFile = null;
    fileInput.value = '';
    fileChip.classList.remove('show');
    fileChipName.textContent = '';
  }
  fileRemove.addEventListener('click', clearFile);

  // --- auto-clear (local preference, applied against the shared DB) ---
  function loadSettings(){
    const saved = localStorage.getItem('relay-autoclear-days');
    autoclearSelect.value = saved !== null ? saved : '7';
  }
  autoclearSelect.addEventListener('change', () => {
    localStorage.setItem('relay-autoclear-days', autoclearSelect.value);
    purgeOld();
  });
  async function purgeOld(){
    const days = parseInt(autoclearSelect.value, 10);
    if(!days || !supabase) return;
    const cutoff = new Date(Date.now() - days * 86400000).toISOString();
    const { error } = await supabase.from(TABLE).delete().lt('created_at', cutoff);
    if(!error) fetchEntries();
  }

  // --- service worker (enables install + offline app shell) ---
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => console.error('SW register failed', err));
    });
  }

  // --- init ---
  loadSettings();
  if(supabase){
    setStatus(false, 'connecting…');
    fetchEntries().then(purgeOld);

    supabase
      .channel('relay_entries_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => checkForUpdates())
      .subscribe((status) => {
        if(status === 'SUBSCRIBED') setStatus(true, 'synced');
      });

    // lightweight fallback check in case realtime drops — does not auto-render
    setInterval(checkForUpdates, 10000);
  }else{
    setStatus(false, 'not connected');
  }
})();
</script>
</body>
</html>
